<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Resume Analyzer Pro</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <h1>🚀 AI Resume Analyzer Pro</h1>

    <label for="files" class="file-label">Upload Resume PDF</label>
    <input type="file" id="files" accept="application/pdf" />

    <input type="text" id="company" placeholder="Target Company (e.g. Google)" />
    <textarea id="job" placeholder="Paste Job Description"></textarea>

    <button id="analyzeBtn">Analyze</button>

    <div id="result"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
